<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Hub</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #2b67f6;
            --primary-dark: #1f4fbe;
            --border: #e5e7eb;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            --radius: 14px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(1200px 500px at 20% -10%, #e7efff 0%, transparent 60%), var(--bg);
            color: var(--text);
        }

        .topbar {
            background: #0f172a;
            color: #fff;
            padding: 14px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .brand-badge {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: linear-gradient(135deg, #4f8cff, #2b67f6);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 6px 18px rgba(43, 103, 246, 0.45);
        }

        .top-links {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .top-links a {
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.92rem;
            padding: 6px 10px;
            border-radius: 8px;
            transition: 0.2s ease;
        }

        .top-links a:hover {
            color: #fff;
            background: rgba(255,255,255,0.08);
        }

        .wrap {
            max-width: 1100px;
            margin: 36px auto;
            padding: 0 20px 40px;
        }

        .hero {
            background: linear-gradient(145deg, #ffffff, #f7faff);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 26px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .hero h1 {
            margin: 0;
            font-size: 1.7rem;
        }

        .hero p {
            margin: 10px 0 0;
            color: var(--muted);
            line-height: 1.5;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: #c7d7ff;
            box-shadow: 0 14px 28px rgba(38, 82, 198, 0.14);
        }

        .card .icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: #eaf0ff;
            color: var(--primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .card h3 {
            margin: 0;
            font-size: 1.05rem;
        }

        .card p {
            margin: 0;
            color: var(--muted);
            font-size: 0.93rem;
            min-height: 36px;
        }

        .card a {
            margin-top: auto;
            text-decoration: none;
            display: inline-block;
            background: var(--primary);
            color: #fff;
            text-align: center;
            padding: 10px 12px;
            border-radius: 10px;
            font-weight: 600;
            transition: background 0.18s ease;
        }

        .card a:hover {
            background: var(--primary-dark);
        }

        footer {
            margin-top: 28px;
            text-align: center;
            color: var(--muted);
            font-size: 0.86rem;
        }

        @media (max-width: 640px) {
            .hero h1 { font-size: 1.4rem; }
            .topbar { padding: 12px 14px; }
            .top-links { display: none; }
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="brand">
        <span class="brand-badge">◆</span>
        <span>Lsgserver services</span>
    </div>
    <nav class="top-links">
        <a href="#apps">Apps</a>
        <a href="#tools">Tools</a>
        <a href="#resources">Resources</a>
    </nav>
</header>

<main class="wrap">
    <section class="hero">
        <h1>Oops! The page hasnt been found!</h1>
        <p>
            Please make sure, that you typed in the right URL or Visit our Hub!
        </p>
    </section>

    <section id="apps" class="grid">
        <article class="card">
            <div class="icon">Hub</div>
            <h3>Hub</h3>
            <p>Access the Hub to select one of our Services!</p>
            <a href="https://lsgserver.dev/" target="_blank" rel="noopener noreferrer">Open Hub</a>
        </article>
    </section>

    <footer>
        © 2026 Lsgserver services • A simple managing software for Kubernetes
    </footer>
</main>
</body>
</html>
